interfaces:
  basic_calc:
    name: Basic Calculator
    description: Perform basic calculator operations
  calc_cli:
    name: Calculator CLI
    description: Perform basic calculator operations via CLI

services:
  add_number_event:
    module_path: app.events.calc
    class_name: AddNumber
  subtract_number_event:
    module_path: app.events.calc
    class_name: SubtractNumber
  multiply_number_event:
    module_path: app.events.calc
    class_name: MultiplyNumber
  divide_number_event:
    module_path: app.events.calc
    class_name: DivideNumber
  exponentiate_number_event:
    module_path: app.events.calc
    class_name: ExponentiateNumber

features:
  calc:
    add:
      name: Add Number
      description: Adds one number to another
      commands:
        - service_id: add_number_event
          name: Add `a` and `b`
    subtract:
      name: Subtract Number
      description: Subtracts one number from another
      commands:
        - service_id: subtract_number_event
          name: Subtract `b` from `a`
    multiply:
      name: Multiply Number
      description: Multiplies one number by another
      commands:
        - service_id: multiply_number_event
          name: Multiply `a` and `b`
    divide:
      name: Divide Number
      description: Divides one number by another
      commands:
        - service_id: divide_number_event
          name: Divide `a` by `b`
    exp:
      name: Exponentiate Number
      description: Raises one number to the power of another
      commands:
        - service_id: exponentiate_number_event
          name: Raise `a` to the power of `b`
    sqrt:
      name: Square Root
      description: Calculates the square root of a number
      commands:
        - service_id: exponentiate_number_event
          name: Calculate square root of `a`
          params:
            b: '0.5'

errors:
  INVALID_INPUT:
    name: Invalid Numeric Input
    message:
      - lang: en_US
        text: 'Value {} must be a number'
      - lang: es_ES
        text: 'El valor {} debe ser un número'
  DIVISION_BY_ZERO:
    name: Division By Zero
    message:
      - lang: en_US
        text: 'Cannot divide by zero'
      - lang: es_ES
        text: 'No se puede dividir por cero'

cli:
  cmds:
    calc:
      add:
        group_key: calc
        key: add
        name: Add Number Command
        description: Adds two numbers.
        args:
          - name_or_flags:
              - a
            description: The first number to add.
          - name_or_flags:
              - b
            description: The second number to add.
      subtract:
        group_key: calc
        key: subtract
        name: Subtract Number Command
        description: Subtracts one number from another.
        args:
          - name_or_flags:
              - a
            description: The number to subtract from.
          - name_or_flags:
              - b
            description: The number to subtract.
      multiply:
        group_key: calc
        key: multiply
        name: Multiply Number Command
        description: Multiplies two numbers.
        args:
          - name_or_flags:
              - a
            description: The first number to multiply.
          - name_or_flags:
              - b
            description: The second number to multiply.
      divide:
        group_key: calc
        key: divide
        name: Divide Number Command
        description: Divides one number by another.
        args:
          - name_or_flags:
              - a
            description: The numerator.
          - name_or_flags:
              - b
            description: The denominator.
      exp:
        group_key: calc
        key: exp
        name: Exponentiate Number Command
        description: Raises one number to the power of another.
        args:
          - name_or_flags:
              - a
            description: The base number.
          - name_or_flags:
              - b
            description: The exponent.
      sqrt:
        group_key: calc
        key: sqrt
        name: Square Root Command
        description: Calculates the square root of a number.
        args:
          - name_or_flags:
              - a
            description: The number to square root.

logging:
  formatters:
    default:
      name: Default Formatter
      format: '%(message)s'
  handlers:
    default:
      name: Default Handler
      module_path: logging
      class_name: StreamHandler
      level: CRITICAL
      formatter: default
      stream: ext://sys.stderr
  loggers:
    root:
      name: Root Logger
      level: CRITICAL
      handlers:
        - default
      is_root: true
    default:
      name: Default Logger
      level: CRITICAL
      handlers:
        - default
