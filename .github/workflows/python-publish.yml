# Unified workflow: builds and publishes Tiferet to PyPI.
#
# Trigger:
#   - Tag push matching 'v*' (e.g. v2.0.0b4, v2.0.0).
#
# Flow:
#   1. test   — runs pytest on 3.10, 3.11, 3.12.
#   2. build  — validates version/tag match, builds tiferet into
#               a dist artifact, runs twine check.
#   3. publish — stable or pre-release publish job, each with a dedicated
#                GitHub environment mapped 1:1 to a PyPI trusted publisher.
#
# Environments (2):
#   pypi-tiferet             — stable releases of tiferet
#   pypi-tiferet-pre         — pre-releases of tiferet

name: Build and Publish Tiferet

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest_env

      - name: Run tests
        run: |
          pytest tests/ tests_int/ --verbose

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      TIFERET_SILENT_IMPORTS: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract version
        id: get_version
        run: |
          TIFERET_VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('tiferet/__init__.py').read_text()
          print(re.search(r\"__version__\s*=\s*['\\\"](.*?)['\\\"]\" , text).group(1))
          ")
          echo "tiferet_version=$TIFERET_VERSION" >> $GITHUB_OUTPUT

      - name: Validate version matches release tag
        run: |
          TAG=${{ github.ref_name }}
          TIFERET_VERSION=${{ steps.get_version.outputs.tiferet_version }}

          if [ "$TAG" != "v$TIFERET_VERSION" ]; then
            echo "Error: Tag ($TAG) does not match tiferet version (v$TIFERET_VERSION)"
            exit 1
          fi

      - name: Build tiferet
        run: |
          python -m build --outdir dist/

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-tiferet
          path: dist/

  # ── tiferet stable ──────────────────────────────────────────
  publish-tiferet:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') }}
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist-tiferet, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { repository-url: 'https://upload.pypi.org/legacy/' }

  # ── tiferet pre-release ─────────────────────────────────────
  publish-tiferet-pre:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist-tiferet, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { repository-url: 'https://upload.pypi.org/legacy/' }
